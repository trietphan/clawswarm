name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (skip publish)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build, Test & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run full test suite
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      # ─── npm publish ───────────────────────────────────────────
      # Uncomment the step below when you're ready to publish.
      #
      # Prerequisites:
      #   1. Set the NPM_TOKEN secret in GitHub repo settings
      #      (Settings → Secrets → Actions → New repository secret)
      #   2. The package name must be available on npm: "clawswarm"
      #
      # - name: Publish to npm
      #   if: inputs.dry-run == 'false'
      #   run: npm publish --provenance --access public
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** clawswarm@$(node -e "console.log(require('./package.json').version)")" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** ${{ inputs.dry-run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node:** $(node -v)" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests:** $(npm test 2>&1 | grep 'Tests' | tail -1 | tr -d ' ')" >> $GITHUB_STEP_SUMMARY
